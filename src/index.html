
<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Smruti Singha">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" href="input.css">
  <title>Check Your Weather, from anywhere!</title>
</head>

<body id="appBg" class="daynight bg-[#0f172a] text-white min-h-screen p-6">

  <!-- HEADER (full width top) -->
  <header class="col-span-2 text-center bg-blue-800 text-white p-6 text-2xl rounded-xl rounded-[20px]">
    Weather Forecast
  </header>

  <!-- MAIN GRID -->
  <div class="grid grid-cols-2 grid-rows-2 gap-8 p-6 h-[90vh] items-center">

    <!-- 🔵 TOP LEFT (Search Section) -->
<section class="bg-gray-800 text-white p-6 rounded-xl flex flex-col items-center justify-center gap-7">

  <input id="cityInput" type="text"
    placeholder="Enter city name"
    class="p-2 text-white rounded-xl w-1/2 border-2 border-gray-300" />

  <button id="searchBtn"
    class="bg-sky-600 px-5 py-2 rounded-xl hover:bg-green-400 w-fit">
    Search
  </button>

  <div class="text-center font-bold text-xl my-2">
    ------ OR ------
  </div>

  <button id="locationBtn"
    class="bg-sky-400 px-5 py-2 rounded-xl hover:bg-emerald-700 w-fit">
    Current Location
  </button>

  <p id="errorMsg"
    class="hidden bg-red-500 p-2 rounded text-center w-full mt-2">
  </p>

</section>

    <!-- 🔵 TOP RIGHT (Today Weather Card) -->
    <section id="todayCard"
      class=" text-white p-6 rounded-xl flex flex-col gap-4">

  <div class="flex items-center justify-between">
    <h2 id="cityName" class="text-5xl"></h2>
    <h2 id="temperature" class="text-6xl text-yellow-300"></h2>
    <img id="weatherIcon" class="w-20 h-20" />
  </div>
      

        <p id="weatherDesc"></p>
      <p id="alertMsg" class="text-red-200 text-2xl"></p>

      <div class="flex gap-4 text-2xl justify-center">
        <p>💧 <span id="humidity"></span>%</p>
        <p>🌬 <span id="wind"></span> m/s</p>
      </div>
    </section>

   <!-- 🔵 BOTTOM LEFT (Recent / Extra Section) -->
<div class="flex justify-center items-center">
  <select id="recentlySearchedCities"
    class="hidden p-2 rounded-xl bg-gray-300 hover:bg-gray-400 text-black w-1/3 font-bold text-xl">
  </select>
</div>

    <!-- 🔵 BOTTOM RIGHT (5-Day Forecast) -->
<section class=" p-6 rounded-xl flex flex-col justify-end">
  <h2 class="text-xl mb-4">5-Day Forecast</h2>
  <div id="forecast" class="flex flex-col text-center gap-2 w-full"></div>
</section>
    
    </section>

  </div>

  <script src="index.js"></script>
</body>
